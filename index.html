<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Búsqueda del Tesoro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <link rel="stylesheet" href="style.css">
  </head>
  
  <body id="cuerpo-web">
    <div id="pantalla-bloqueo-global" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; color:white; justify-content:center; align-items:center; flex-direction:column; text-align: center;">
       <h1 class="text-danger fw-bold mb-3" style="font-size: 3rem;"> JUEGO<br>FINALIZADO</h1>
       <p class="fs-4 px-4 text-warning">El tiempo ha concluido o tu equipo ya terminó.<br>Diríjanse a la base central.</p>
    </div>

    <div id="mi-alerta" class="modal-personalizado" style="display:none;">
      <div class="alerta-contenido">
        <p id="alerta-mensaje"></p>
        <button class="btn btn-dark fw-bold text-uppercase" onclick="cerrarAlerta()">ACEPTAR</button>
      </div>
    </div>

    <div style="position: absolute; top: 10px; right: 10px; z-index: 2000;">
      <button class="btn btn-sm text-secondary border-0" style="opacity: 0.3;" onclick="confirmarReinicio()">R</button>
    </div>

    <div class="container-fluid p-0">
      
      <div id="vista-equipos">
        <h2 class="text-center fw-bold text-white text-uppercase mt-2 mb-0" style="font-size: 1.2rem; opacity: 0.8;">ELIGE TU EQUIPO</h2>
        <div id="contenedor-botones"></div>
      </div>

      <div id="vista-login" class="text-center p-4" style="display:none;">
        <div id="cabecera-login" class="p-4 mb-4 rounded shadow fw-bold fs-3 border border-dark text-uppercase"></div>
        <div class="card p-4 shadow-lg border-dark">
          <p class="fw-bold text-dark">CÓDIGO DE ACCESO:</p>
          <input type="number" id="input-codigo" class="form-control mb-3 text-center fs-2 input-acceso" placeholder="000000">
          <button class="btn btn-dark btn-lg w-100 mb-2 fw-bold" onclick="verificarCodigo()">CONTINUAR</button>
          <button class="btn btn-link text-dark fw-bold" onclick="resetSesion()">VOLVER</button>
        </div>
      </div>

      <div id="vista-juego" style="display:none;">
        
        <div class="progreso-container text-center shadow-sm">
          <p class="texto-progreso text-uppercase text-white m-0 fw-bold">ESTACIONES: <span id="num-pasos">0</span> / 8</p>
          <div class="progress mt-1">
            <div id="barra-completado" class="progress-bar progress-bar-striped progress-bar-animated text-white" style="width: 0%">0%</div>
          </div>
        </div>

        <div id="tarjeta-dinamica" class="mt-3 px-3">
          
          <div id="pantalla-pista" style="display:none;">
            <div class="glass-card">
              <p class="titulo-mision">🎯 PRÓXIMO DESTINO</p>
              <div id="texto-pista" class="pista-texto-premium text-uppercase"></div>
            </div>
          </div>

          <div id="pantalla-acertijo" style="display:none;">
            <div class="glass-card">
              <p class="titulo-mision" style="color: #e74c3c;">⚠️ DESAFÍO ACTIVO</p>
              <p id="texto-acertijo" class="pista-texto-premium mb-4"></p>
              
              <input type="text" id="input-respuesta" class="form-control form-control-lg mb-3 text-center fw-bold fs-3" style="height: 65px; background: rgba(255,255,255,0.9); border-radius: 15px; border: none;" placeholder="RESPUESTA...">
              
              <div id="error-respuesta" class="mb-3 text-center" style="display: none; color: #ff6b6b; font-weight: bold; text-shadow: 1px 1px 2px #000;">❌ INCORRECTO</div>
              
              <button id="btn-enviar-respuesta" class="btn btn-light btn-lg w-100 fw-bold py-3 text-uppercase" style="border-radius: 15px; color: #000; box-shadow: 0 4px 8px rgba(0,0,0,0.3);" onclick="enviarRespuesta()">VERIFICAR</button>
            </div>
          </div>

          <div id="pantalla-tesoro" style="display:none;" class="px-2">
            <div class="p-4 bg-parchment rounded shadow-lg text-center mt-4">
              <h1 class="fw-bold text-uppercase mb-2">¡ESTÁN POR LOGRARLO!</h1>
              <div class="treasure-icon">💰</div>
              <p id="pista-tesoro-final" class="fw-bold mt-3"></p>
              <label class="btn btn-brown btn-lg mt-3 py-3 fw-bold w-100 text-uppercase shadow">
                📸 SUBIR FOTO FINAL
                <input type="file" id="foto-tesoro" accept="image/*" capture="camera" style="display:none;" onchange="procesarFoto()">
              </label>
              <p id="status-foto" class="small mt-2 fw-bold"></p>
            </div>
          </div>
        </div>

        <div id="contenedor-escanear-fijo" class="contenedor-qr-accion" style="display:none;">
          <button class="btn-scan-circular" onclick="abrirEscaner()">
            <span class="icon-cam">📷</span>
          </button>
        </div>

      </div>

      <div id="vista-qr" style="display:none;" class="text-center p-3">
        <h4 class="fw-bold my-3 text-white text-uppercase">ESCANEANDO ESTACIÓN</h4>
        <div id="reader" class="rounded shadow-lg border border-secondary" style="background: #000; min-height: 350px;"></div>
        <button class="btn btn-danger btn-lg mt-4 w-100 fw-bold shadow" onclick="cerrarEscaner()">CANCELAR ESCANEO</button>
      </div>

    </div>

    <script src="script.js"></script>
  </body>
</html>
